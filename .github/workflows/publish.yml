name: Publish
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Publish all packages
        run: |
          for pkg in packages/*/; do
            echo "Publishing ${pkg%/}..."
            npx jsr publish --no-check -p "${pkg%/}"
          done
